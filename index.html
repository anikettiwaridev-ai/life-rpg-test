<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life RPG</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">LR</div>
          <div>
            <h1>Life RPG</h1>
            <p>Offline character progression</p>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Player Command Center</p>
            <h2 id="page-title">Dashboard</h2>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="export-data" title="Export save data">⇩</button>
            <label class="icon-button file-label" title="Import save data">
              ⇧
              <input id="import-data" type="file" accept="application/json" />
            </label>
            <button class="danger-button" id="reset-data">Reset</button>
          </div>
        </header>

        <section id="view" class="view-panel" aria-live="polite"></section>
      </main>
    </div>

    <template id="empty-template">
      <div class="empty-state">
        <div class="empty-icon">◇</div>
        <h3>No entries yet</h3>
        <p>Add one to start earning XP.</p>
      </div>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
